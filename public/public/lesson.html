<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCA Lesson</title>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Tiro+Bangla:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS v4 via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .btn-continue {
            background-color: #58cc02;
            border-bottom: 4px solid #46a302;
            transition: all 0.1s ease;
        }

        .btn-continue:active {
            border-bottom-width: 0px;
            transform: translateY(4px);
        }

        .lesson-content img {
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        video {
            border-radius: 1rem;
            width: 100%;
            max-height: 400px;
            background: #000;
        }
    </style>
</head>

<body class="bg-white min-h-screen flex flex-col">
    <!-- Header with Progress Bar -->
    <header class="w-full px-4 py-6 flex items-center justify-between gap-4 max-w-4xl mx-auto">
        <button onclick="window.location.href='/classes.html'" class="text-gray-400 hover:text-gray-600 transition-colors">
            <i class="fa-solid fa-xmark text-2xl"></i>
        </button>
        <div class="flex-1 bg-gray-200 h-4 rounded-full overflow-hidden">
            <div id="lessonProgress" class="bg-[#58cc02] h-full transition-all duration-500 rounded-full" style="width: 10%;"></div>
        </div>
        <div class="flex items-center gap-1 text-red-500 font-bold">
            <i class="fa-solid fa-heart"></i>
            <span>5</span>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 w-full max-w-2xl mx-auto px-6 py-8 flex flex-col justify-center">
        <div id="contentLoading" class="flex flex-col items-center gap-4 py-20">
            <div class="w-12 h-12 border-4 border-gray-200 border-t-[#58cc02] rounded-full animate-spin"></div>
            <p class="text-gray-400 font-bold">Loading lession...</p>
        </div>

        <div id="lessonContent" class="hidden flex-col gap-8 opacity-0 transition-opacity duration-500">
            <h1 id="lessonTitle" class="text-2xl md:text-3xl font-bold text-gray-800 leading-tight"></h1>
            
            <div id="mediaContainer" class="w-full flex flex-col gap-6">
                <!-- Video or Images injected here -->
            </div>

            <div id="textContainer" class="flex flex-col gap-4">
                <!-- Text blocks injected here -->
            </div>

            <div id="audioContainer" class="flex flex-col gap-3">
                <!-- Audio players injected here -->
            </div>
        </div>
    </main>

    <!-- Footer with Continue Button -->
    <footer class="w-full border-t border-gray-200 px-6 py-6 md:py-10">
        <div class="max-w-4xl mx-auto flex justify-end">
            <button id="btnContinue" class="btn-continue w-full md:w-auto md:min-w-[150px] text-white font-bold py-4 px-10 rounded-2xl uppercase tracking-widest text-lg">
                Continue
            </button>
        </div>
    </footer>

    <script src="./js/academy/lesson.js"></script>
</body>

</html>
