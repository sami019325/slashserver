<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCA Quiz</title>
    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Tiro+Bangla:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS v4 via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Removed overflow: hidden to prevent content from being cut off on small screens */
        }

        .btn-check {
            background-color: #58cc02;
            border-bottom: 4px solid #46a302;
            transition: all 0.1s ease;
        }

        .btn-check:disabled {
            background-color: #e5e5e5;
            border-bottom-color: #d1d1d1;
            color: #afafaf;
            cursor: not-allowed;
        }

        .btn-check:not(:disabled):active {
            border-bottom-width: 0px;
            transform: translateY(4px);
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 1rem;
            border-radius: 1rem;
            border: 2px solid #e5e5e5;
            border-bottom-width: 4px;
            transition: all 0.2s;
            font-weight: 700;
            color: #374151;
            font-size: 1.125rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option-btn.selected {
            border-color: #1cb0f6;
            background-color: rgba(28, 176, 246, 0.1);
            color: #1cb0f6;
        }

        .option-number {
            width: 2rem;
            height: 2rem;
            border-radius: 0.5rem;
            border: 2px solid #e5e5e5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
        }

        .option-btn.selected .option-number {
            border-color: #1cb0f6;
            background-color: #1cb0f6;
            color: #ffffff;
        }

        .feedback-bar {
            transition: transform 0.3s cubic-bezier(0, 0.5, 0.5, 1);
            transform: translateY(100%);
        }

        .feedback-bar.show {
            transform: translateY(0);
        }
    </style>
</head>

<body class="bg-white min-h-screen flex flex-col">
    <!-- Header with Progress Bar -->
    <header class="w-full px-4 py-6 flex items-center justify-between gap-4 max-w-4xl mx-auto">
        <button onclick="window.location.href='/classes.html'" class="text-gray-400 hover:text-gray-600 transition-colors">
            <i class="fa-solid fa-xmark text-2xl"></i>
        </button>
        <div class="flex-1 bg-gray-200 h-4 rounded-full overflow-hidden">
            <div id="quizProgress" class="bg-[#58cc02] h-full transition-all duration-500 rounded-full" style="width: 0%;"></div>
        </div>
        <div class="flex items-center gap-1 text-red-500 font-bold">
            <i class="fa-solid fa-heart"></i>
            <span>5</span>
        </div>
    </header>

    <!-- Main Question Area -->
    <main class="flex-1 w-full max-w-2xl mx-auto px-6 py-8 flex flex-col">
        <div id="contentLoading" class="flex flex-col items-center gap-4 py-20 flex-1 justify-center">
            <div class="w-12 h-12 border-4 border-gray-200 border-t-[#58cc02] rounded-full animate-spin"></div>
            <p class="text-gray-400 font-bold">Loading quiz...</p>
        </div>

        <div id="quizContent" class="hidden flex-col gap-6 opacity-0 transition-opacity duration-500 flex-1">
            <h1 id="questionText" class="text-2xl md:text-3xl font-bold text-gray-800 leading-tight mb-4"></h1>
            
            <div id="questionMedia" class="w-full flex justify-center mb-6 empty:hidden">
                <!-- Question images injected here -->
            </div>

            <div id="optionsContainer" class="flex flex-col gap-3">
                <!-- Options injected here -->
            </div>
        </div>
    </main>

    <!-- Footer with Check Button -->
    <footer id="quizFooter" class="w-full border-t border-gray-200 px-6 py-6 md:py-10 bg-white relative">
        <div class="max-w-4xl mx-auto flex justify-end">
            <button id="btnCheck" disabled class="btn-check w-full md:w-auto md:min-w-[150px] text-white font-bold py-4 px-10 rounded-2xl uppercase tracking-widest text-lg z-10">
                Check
            </button>
        </div>

        <!-- Feedback Overlay -->
        <div id="feedbackBar" class="feedback-bar absolute bottom-0 left-0 right-0 z-50 px-6 py-6 md:py-10 flex flex-col md:flex-row items-center justify-between max-md:gap-8 h-auto min-h-full transition-all duration-300">
            <div class="flex items-center gap-4">
                <div id="feedbackIcon" class="w-12 h-12 rounded-full flex items-center justify-center text-white text-2xl">
                </div>
                <div>
                    <h3 id="feedbackTitle" class="text-xl font-bold"></h3>
                    <p id="feedbackExplanation" class="text-sm font-medium opacity-80"></p>
                </div>
            </div>
            <button id="btnContinue" class="w-full md:w-auto md:min-w-[150px] text-white font-bold py-4 px-10 rounded-2xl uppercase tracking-widest text-lg shadow-lg">
                Continue
            </button>
        </div>
    </footer>

    <script src="./js/academy/quiz.js"></script>
</body>

</html>
